<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>都立大バス時刻表 | 東京都立大学 南大沢⇔日野キャンパス連絡バス タイムテーブル</title>
  <meta name="description" content="都立大バスを調べたい方向けの、東京都立大学 南大沢⇔日野キャンパス連絡バスの時刻表ページです。今日の運行種別、次の便、月ごとの運行日をスマホでも見やすく確認できます。">
  <link rel="canonical" href="https://tenxnet.github.io/TMU_BusTimetable/">
  <meta property="og:title" content="都立大バス時刻表 | 東京都立大学 南大沢⇔日野キャンパス連絡バス タイムテーブル">
  <meta property="og:description" content="東京都立大学 南大沢⇔日野キャンパス連絡バスの時刻表ページです。次の便や今日の運行種別をすばやく確認できます。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tenxnet.github.io/TMU_BusTimetable/">
  <meta property="og:locale" content="ja_JP">
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-title" id="route-label">東京都立大学 南大沢⇔日野キャンパス連絡バス タイムテーブル</div>

      <div class="meta-grid">
        <article class="meta-card">
          <span>現在時刻</span>
          <strong id="current-time">--</strong>
        </article>
        <article class="meta-card">
          <span>運行種別</span>
          <strong id="service-type">--</strong>
        </article>
        <article class="meta-card">
          <span>ルート</span>
          <strong id="route-name">--</strong>
        </article>
        <article class="meta-card">
          <span>初期停留所</span>
          <strong id="selected-stop-label">--</strong>
        </article>
      </div>
    </section>

    <section class="layout">
      <section class="panel">
        <h2>検索</h2>
        <div class="form-grid">
          <div>
            <label for="stop">停留所</label>
            <select id="stop"></select>
          </div>
          <div>
            <label for="date">日付</label>
            <input id="date" type="date">
          </div>
          <div>
            <label for="time">時刻</label>
            <input id="time" type="time" step="60">
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="search-btn" type="button">この条件で検索</button>
          <button class="btn btn-secondary" id="now-btn" type="button">現在時刻で検索</button>
        </div>

        <div class="cards" id="upcoming-list"></div>

        <section class="calendar-panel" aria-labelledby="calendar-title">
          <div class="calendar-head">
            <div class="calendar-head-copy">
              <h3 id="calendar-title">--</h3>
              <p id="calendar-caption">運行日を表示しています</p>
            </div>
            <div class="calendar-nav">
              <button class="calendar-nav-btn" id="calendar-prev" type="button" aria-label="前の月">‹</button>
              <button class="calendar-nav-btn" id="calendar-next" type="button" aria-label="次の月">›</button>
            </div>
          </div>
          <div class="calendar-weekdays" aria-hidden="true">
            <span>日</span>
            <span>月</span>
            <span>火</span>
            <span>水</span>
            <span>木</span>
            <span>金</span>
            <span>土</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </section>
      </section>

      <aside class="panel timeline-panel">
        <div class="timeline-head">
          <div>
            <h2>本日の運行スケジュール</h2>
            <p id="timeline-subtitle">2台運行日 / 1台運行日を表示します</p>
          </div>
          <div class="timeline-legend">
            <span><i class="legend-line"></i>現在時刻</span>
            <span><i class="legend-dot"></i>発車</span>
          </div>
        </div>
        <div class="timeline" id="schedule-list"></div>
        <p class="note" id="note"></p>
      </aside>
    </section>

    <footer class="site-footer">
      <div class="footer-sources">
        <span>リンク集</span>
        <div class="footer-source-links">
          <a href="https://www.tmu.ac.jp/campuslife_career/facility/minamiosawa_hino.html" target="_blank" rel="noreferrer">都立大連絡バス情報</a>
          <a href="https://www.tmu.ac.jp/" target="_blank" rel="noreferrer">都立大HP</a>
          <a href="https://kibaco-d.tmu.ac.jp/login" target="_blank" rel="noreferrer">Kibaco</a>
        </div>
      </div>
      <p>ご要望・間違いなどあれば気軽にご連絡ください。</p>
      <div class="footer-links">

          </svg>

    </footer>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
